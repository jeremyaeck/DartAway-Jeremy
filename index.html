<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartAway - Jeremy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #050510 0%, #0a0a2e 50%, #050518 100%);
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            left: 0;
            right: 0;
            height: 120px;
            z-index: 5;
            pointer-events: none;
        }

        body::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(5, 5, 16, 0.8), transparent);
        }

        body::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(5, 5, 16, 0.8), transparent);
        }

        #app-header {
            position: fixed;
            top: 24px;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        #app-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ee5a24, #ff9a56, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #app-header p {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #globe-container {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        #controls {
            padding: 24px 0 40px;
            text-align: center;
        }

        #dart {
            font-size: 64px;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            animation: dartPulse 2s ease-in-out infinite, fadeInUp 1s ease 0.5s both;
            transition: transform 0.2s;
            filter: drop-shadow(0 0 12px rgba(255, 100, 50, 0.6));
        }

        #dart:hover:not(.thrown) {
            transform: scale(1.15);
            animation: none;
        }

        @keyframes dartPulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 100, 50, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 100, 50, 0.8)) drop-shadow(0 0 40px rgba(238, 90, 36, 0.3)); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #dart.thrown {
            position: fixed;
            pointer-events: none;
            cursor: default;
        }

        /* Country info modal */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 16, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #modal {
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.85) 0%, rgba(15, 15, 42, 0.9) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 36px 40px;
            max-width: 480px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(30px) scale(0.9);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6),
                        0 0 60px rgba(238, 90, 36, 0.08),
                        inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        #modal-overlay.visible #modal {
            transform: translateY(0) scale(1);
        }

        #modal h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: #fff;
        }

        #modal .capital {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        #modal .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ee5a24;
            margin-bottom: 8px;
            font-weight: 700;
        }

        #modal .fun-fact {
            font-size: 0.95rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #ee5a24;
        }

        #photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .photo-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: rgba(255, 255, 255, 0.05);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .photo-card img.loaded {
            opacity: 1;
        }

        .photo-card .photo-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 4px 8px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .photo-card .photo-spinner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
        }

        #modal .activities {
            list-style: none;
            padding: 0;
        }

        #modal .activities li {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #modal .activities li:last-child {
            border-bottom: none;
        }

        #modal .activities li::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ee5a24;
            border-radius: 50%;
            flex-shrink: 0;
        }

        #modal-buttons {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        #modal-buttons button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        #modal-buttons button:active {
            transform: scale(0.97);
        }

        #btn-retry {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        #btn-retry:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        #btn-vacation {
            background: #ee5a24;
        }

        #btn-vacation:hover {
            background: #d84315;
        }

        /* Vacation message area */
        #vacation-msg {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #4ecdc4;
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            white-space: pre-wrap;
        }

        #vacation-msg.visible {
            display: block;
        }

        #btn-copy {
            margin-top: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #4ecdc4;
            color: #0a0a1a;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn-copy:hover {
            background: #3dbdb5;
        }
    </style>
</head>

        <h1>DartAway</h1>

    </div>
    <div id="modal-overlay">
        <div id="modal">

            <div class="section-title">Landscapes</div>
            <div id="photo-grid"></div>
            <div class="section-title">Fun fact</div>
            <div class="fun-fact" id="modal-fact"></div>
            <div class="section-title">Top activities</div>
            <ul class="activities" id="modal-activities"></ul>
            <div id="modal-buttons">
                <button id="btn-retry" onclick="resetGlobe()">Relancer</button>
                <button id="btn-vacation" onclick="generateVacationMsg()">Demander un conge</button>
            </div>
            <div id="vacation-msg"></div>
        </div>

    <div id="globe-container"></div>
    <div id="controls">
        <div id="dart">🎯</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('globe-container');
        const dartEl = document.getElementById('dart');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight - 100), 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 100);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting — warm key + cool fill for depth
        const ambientLight = new THREE.AmbientLight(0x222244, 0.6);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        keyLight.position.set(5, 3, 5);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x4466aa, 0.4);
        fillLight.position.set(-5, -2, -3);
        scene.add(fillLight);

        // Starfield — more stars, varying sizes for depth
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPositions = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 120;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 120;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
            starSizes[i] = Math.random() * 0.15 + 0.03;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        const starMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            transparent: true,
            opacity: 0.85,
            sizeAttenuation: true,
        });
        scene.add(new THREE.Points(starGeometry, starMaterial));

        // Globe with bump + specular maps
        const loader = new THREE.TextureLoader();
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshPhongMaterial({
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            bumpMap: loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
            bumpScale: 0.015,
            specularMap: loader.load('https://unpkg.com/three-globe/example/img/earth-water.png'),
            specular: new THREE.Color(0x333333),
            shininess: 15,
        });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Atmosphere glow (Fresnel rim shader)
        const atmosphereVertexShader = `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const atmosphereFragmentShader = `
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
            }
        `;
        const atmosphereMaterial = new THREE.ShaderMaterial({
            vertexShader: atmosphereVertexShader,
            fragmentShader: atmosphereFragmentShader,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true,
        });
        const atmosphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.15, 64, 64),
            atmosphereMaterial
        );
        scene.add(atmosphere);

        // Dart start position (captured when thrown)

        // Convert lat/lng to 3D point on sphere (radius 1)
        function latLngToVector3(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -Math.sin(phi) * Math.cos(theta),
                Math.cos(phi),
                Math.sin(phi) * Math.sin(theta)
            );
        }

        // Project 3D world position to 2D screen coordinates
        function toScreenPosition(worldPos) {
            const vector = worldPos.clone().project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            return {
                x: (vector.x * 0.5 + 0.5) * rect.width + rect.left,
                y: (-vector.y * 0.5 + 0.5) * rect.height + rect.top,
            };
        }

        // Count visible countries at a given globe Y rotation
        function countVisibleCountries(rotationY) {
            let count = 0;
            const tempMatrix = new THREE.Matrix4().makeRotationY(rotationY);
            for (const [name, lat, lng] of countries) {
                const localPos = latLngToVector3(lat, lng);
                const worldPos = localPos.clone().applyMatrix4(tempMatrix);
                const dirToCamera = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
                const normal = worldPos.clone().normalize();
                if (normal.dot(dirToCamera) > 0) count++;
            }
            return count;
        }

        // Minimum visible countries to consider the face "land-rich" (not 90%+ ocean)
        const MIN_VISIBLE_COUNTRIES = 5;

        // Find the nearest good rotation if current face is too oceanic
        function findLandRichRotation(currentRotY) {
            if (countVisibleCountries(currentRotY) >= MIN_VISIBLE_COUNTRIES) return currentRotY;
            // Search in small increments in both directions
            for (let offset = 0.05; offset < Math.PI; offset += 0.05) {
                if (countVisibleCountries(currentRotY + offset) >= MIN_VISIBLE_COUNTRIES) return currentRotY + offset;
                if (countVisibleCountries(currentRotY - offset) >= MIN_VISIBLE_COUNTRIES) return currentRotY - offset;
            }
            return currentRotY;
        }

        // Pick a random country visible on the front face of the globe
        function pickVisibleCountry() {
            const visible = [];
            for (const [name, lat, lng, capital, funFact, activities, landmarks] of countries) {
                const localPos = latLngToVector3(lat, lng);
                const worldPos = localPos.clone().applyMatrix4(globe.matrixWorld);
                const dirToCamera = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
                const normal = worldPos.clone().sub(globe.position).normalize();
                // Accept any country on the visible hemisphere (dot > 0)
                if (normal.dot(dirToCamera) > 0) {
                    visible.push({ name, lat, lng, capital, funFact, activities, landmarks, localPos, worldPos });
                }
            }
            if (visible.length === 0) return null;
            return visible[Math.floor(Math.random() * visible.length)];
        }

        // Animate the dart throw with realistic parabola
        function throwDart(target) {
            const rect = dartEl.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;
            // Switch to fixed positioning for flight
            dartEl.classList.add('thrown');
            dartEl.style.left = (startX - rect.width / 2) + 'px';
            dartEl.style.top = (startY - rect.height / 2) + 'px';

            const screenTarget = toScreenPosition(target.worldPos);
            const endX = screenTarget.x;
            const endY = screenTarget.y;

            // Parabola parameters
            const dx = endX - startX;
            const dy = endY - startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const arcHeight = Math.max(200, dist * 0.5); // Bigger arc for longer throws
            const duration = 900;
            const start = performance.now();

            function animateDart(now) {
                const t = Math.min((now - start) / duration, 1);
                // Ease-out for deceleration feel at the end
                const ease = 1 - Math.pow(1 - t, 2.5);

                // Linear interpolation + parabolic arc
                const x = startX + dx * ease;
                const baseY = startY + dy * ease;
                // Parabola: peaks at t=0.4 (earlier peak feels more like a throw)
                const arc = -arcHeight * Math.sin(Math.PI * Math.pow(t, 0.7));
                const y = baseY + arc;

                dartEl.style.left = (x - rect.width / 2) + 'px';
                dartEl.style.top = (y - rect.height / 2) + 'px';

                // Rotate dart to follow trajectory (tangent angle)
                const nextT = Math.min(t + 0.02, 1);
                const nextEase = 1 - Math.pow(1 - nextT, 2.5);
                const nextX = startX + dx * nextEase;
                const nextBaseY = startY + dy * nextEase;
                const nextArc = -arcHeight * Math.sin(Math.PI * Math.pow(nextT, 0.7));
                const nextY = nextBaseY + nextArc;
                const angle = Math.atan2(nextY - y, nextX - x) * (180 / Math.PI);
                dartEl.style.transform = `rotate(${angle}deg)`;

                if (t < 1) {
                    requestAnimationFrame(animateDart);
                } else {
                    dartEl.style.transform = 'rotate(0deg) scale(1.3)';
                    placePinOnGlobe(target);
                }
            }
            requestAnimationFrame(animateDart);
        }

        // Zoom camera to target country
        let zooming = false;
        let zoomStart = 0;
        const ZOOM_DURATION = 2000;
        let zoomStartPos = null;
        let zoomEndPos = null;
        let zoomStartLookAt = null;
        let zoomEndLookAt = null;
        let zoomTarget = null;

        function startZoom(target) {
            zooming = true;
            zoomStart = performance.now();
            zoomTarget = target;

            zoomStartPos = camera.position.clone();
            zoomStartLookAt = new THREE.Vector3(0, 0, 0);

            // Compute a camera position close to the country, looking at the globe surface
            const worldPos = target.localPos.clone().applyMatrix4(globe.matrixWorld);
            const normal = worldPos.clone().sub(globe.position).normalize();
            // Position camera 1.6 units from globe center along the normal (globe radius is 1)
            zoomEndPos = globe.position.clone().add(normal.clone().multiplyScalar(1.6));
            zoomEndLookAt = worldPos.clone();
        }

        function updateZoom(time) {
            if (!zooming) return;
            const elapsed = time - zoomStart;
            const t = Math.min(elapsed / ZOOM_DURATION, 1);
            // Smooth ease-in-out
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            camera.position.lerpVectors(zoomStartPos, zoomEndPos, ease);
            const lookAt = new THREE.Vector3().lerpVectors(zoomStartLookAt, zoomEndLookAt, ease);
            camera.lookAt(lookAt);

            if (t >= 1) {
                zooming = false;
                showCountryLabel(zoomTarget);
            }
        }

        // Place a small red pin on the globe at the target
        function placePinOnGlobe(target) {
            const pinGeometry = new THREE.SphereGeometry(0.025, 16, 16);
            const pinMaterial = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            const pin = new THREE.Mesh(pinGeometry, pinMaterial);
            pin.position.copy(target.localPos.clone().multiplyScalar(1.02));
            globe.add(pin);

            // Start zoom after placing pin
            startZoom(target);
        }

        // Fetch landmark photo from Wikipedia with search fallback
        async function fetchWikiPhoto(landmark) {
            try {
                // Try direct article match first
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(landmark)}`);
                const data = await res.json();
                if (data.thumbnail && data.thumbnail.source) {
                    return data.thumbnail.source.replace(/\/\d+px-/, '/400px-');
                }
                // Fallback: search Wikipedia for the landmark
                const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(landmark)}&gsrlimit=3&prop=pageimages&piprop=thumbnail&pithumbsize=400&format=json&origin=*`);
                const searchData = await searchRes.json();
                if (searchData.query && searchData.query.pages) {
                    const pages = Object.values(searchData.query.pages);
                    for (const page of pages) {
                        if (page.thumbnail && page.thumbnail.source) {
                            return page.thumbnail.source;
                        }
                    }
                }
            } catch (e) {}
            return null;
        }

        async function loadPhotos(landmarks) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            for (const landmark of landmarks) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `<div class="photo-spinner">...</div><div class="photo-label">${landmark}</div>`;
                grid.appendChild(card);
            }
            // Fetch all photos in parallel
            const results = await Promise.all(landmarks.map(l => fetchWikiPhoto(l)));
            const cards = grid.querySelectorAll('.photo-card');
            results.forEach((url, i) => {
                if (url && cards[i]) {
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = landmarks[i];
                    img.onload = () => img.classList.add('loaded');
                    cards[i].querySelector('.photo-spinner').remove();
                    cards[i].insertBefore(img, cards[i].firstChild);
                }
            });
        }

        function showCountryLabel(target) {
            currentCountryName = target.name;
            const flag = countryFlags[target.name] || '';
            document.getElementById('modal-country').textContent = flag + ' ' + target.name;
            document.getElementById('modal-capital').textContent = 'Capital: ' + target.capital;
            document.getElementById('modal-fact').textContent = target.funFact;
            const list = document.getElementById('modal-activities');
            list.innerHTML = '';
            for (const activity of target.activities) {
                const li = document.createElement('li');
                li.textContent = activity;
                list.appendChild(li);
            }
            document.getElementById('vacation-msg').classList.remove('visible');
            const existingCopy = document.getElementById('btn-copy');
            if (existingCopy) existingCopy.remove();
            // Load photos
            if (target.landmarks) loadPhotos(target.landmarks);
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.add('visible');
            }, 400);
        }

        let currentCountryName = '';

        // Country name to flag emoji mapping
        const countryFlags = {
            "France": "\u{1F1EB}\u{1F1F7}", "Brazil": "\u{1F1E7}\u{1F1F7}", "Japan": "\u{1F1EF}\u{1F1F5}",

            "Saudi Arabia": "\u{1F1F8}\u{1F1E6}", "Indonesia": "\u{1F1EE}\u{1F1E9}", "Thailand": "\u{1F1F9}\u{1F1ED}",
            "Colombia": "\u{1F1E8}\u{1F1F4}", "Peru": "\u{1F1F5}\u{1F1EA}", "Chile": "\u{1F1E8}\u{1F1F1}",
            "Morocco": "\u{1F1F2}\u{1F1E6}", "Algeria": "\u{1F1E9}\u{1F1FF}", "Norway": "\u{1F1F3}\u{1F1F4}",
            "Sweden": "\u{1F1F8}\u{1F1EA}", "Finland": "\u{1F1EB}\u{1F1EE}", "Poland": "\u{1F1F5}\u{1F1F1}",

            "Mongolia": "\u{1F1F2}\u{1F1F3}", "Vietnam": "\u{1F1FB}\u{1F1F3}", "Philippines": "\u{1F1F5}\u{1F1ED}",
            "New Zealand": "\u{1F1F3}\u{1F1FF}", "Iceland": "\u{1F1EE}\u{1F1F8}", "Cuba": "\u{1F1E8}\u{1F1FA}",
            "Madagascar": "\u{1F1F2}\u{1F1EC}", "Ethiopia": "\u{1F1EA}\u{1F1F9}", "Tanzania": "\u{1F1F9}\u{1F1FF}",
            "Pakistan": "\u{1F1F5}\u{1F1F0}", "Afghanistan": "\u{1F1E6}\u{1F1EB}", "Iraq": "\u{1F1EE}\u{1F1F6}",
            "Venezuela": "\u{1F1FB}\u{1F1EA}", "Ecuador": "\u{1F1EA}\u{1F1E8}", "Bolivia": "\u{1F1E7}\u{1F1F4}",
        };

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('visible');
            document.getElementById('vacation-msg').classList.remove('visible');
        }

        function resetGlobe() {
            closeModal();
            // Remove pin from globe
            const toRemove = [];
            globe.children.forEach(c => { if (c.isMesh) toRemove.push(c); });
            toRemove.forEach(c => globe.remove(c));
            // Reset dart
            dartEl.classList.remove('thrown');
            dartEl.style.cssText = '';
            dartEl.style.opacity = '1';
            dartEl.style.pointerEvents = 'auto';
            // Reset camera
            camera.position.set(0, 0, 3);
            camera.lookAt(0, 0, 0);
            // Reset state
            rotationSpeed = BASE_SPEED;
            decelerating = false;
            globeStopped = false;
            zooming = false;
        }

        const vacationMessages = [
            (c) => `Salut boss ! Mon globe terrestre vient de choisir ${c} pour moi. C'est un signe du destin, non ? Je pose mes jours, j'ai deja mentalement fait mes valises.`,
            (c) => `Hey ! Figure-toi qu'une flechette magique vient de m'envoyer a ${c}. Je suis legalement oblige d'y aller. C'est dans la convention de Geneve, je crois. Jours de conge, please ?`,
            (c) => `Chef, j'ai une urgence : ${c} a besoin de moi. Perso je suis pas convaincu non plus, mais qui suis-je pour defier la flechette du destin ? Je reviens bronze et motive.`,
            (c) => `BREAKING NEWS : La flechette a parle. Direction ${c}. Je pourrais ignorer l'appel de l'aventure, mais on sait tous les deux que ma productivite serait nulle. Autant poser des conges.`,
            (c) => `Coucou ! Une intelligence artificielle couplée a un globe me dit d'aller a ${c}. Refuser serait impoli envers la technologie. Je peux prendre des jours de conge ?`,
            (c) => `Urgent : mon karma exige un voyage a ${c}. Le refuser pourrait impacter negativement les KPIs de l'equipe. Je prends mes conges pour le bien de tous.`,
            (c) => `Hello ! J'ai fait tourner le globe et la flechette a choisi ${c}. C'est plus fort que moi. On se revoit dans une semaine, recharged a 200% ?`,
            (c) => `Boss, bonne nouvelle : j'ai trouve ma prochaine destination de team building solo. ${c} ! Je me sacrifie pour tester. Juste besoin de quelques jours de conge...`,
        ];

        function generateVacationMsg() {
            const msgEl = document.getElementById('vacation-msg');
            const randomMsg = vacationMessages[Math.floor(Math.random() * vacationMessages.length)];
            const text = randomMsg(currentCountryName);

            // Add copy button if not there yet
            if (!document.getElementById('btn-copy')) {
                const copyBtn = document.createElement('button');
                copyBtn.id = 'btn-copy';
                copyBtn.textContent = 'Copier le message';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.textContent = 'Copie !';
                    setTimeout(() => { copyBtn.textContent = 'Copier le message'; }, 1500);
                };
                msgEl.parentNode.insertBefore(copyBtn, msgEl.nextSibling);
            }

            msgEl.textContent = text;
            msgEl.classList.add('visible');

            // Update copy button handler with new text
            const copyBtn = document.getElementById('btn-copy');
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(text);
                copyBtn.textContent = 'Copie !';
                setTimeout(() => { copyBtn.textContent = 'Copier le message'; }, 1500);
            };
        }

        function launchDart() {
            const target = pickVisibleCountry();
            if (target) throwDart(target);
        }

        // Rotation state
        const BASE_SPEED = 0.045;
        let rotationSpeed = BASE_SPEED;
        let decelerating = false;
        let decelStartTime = 0;
        let decelDuration = 5000;
        let globeStopped = false;

        dartEl.addEventListener('click', () => {
            if (dartEl.classList.contains('thrown')) return;
            dartEl.style.opacity = '0.5';
            dartEl.style.pointerEvents = 'none';
            decelerating = true;
            decelStartTime = performance.now();
            decelDuration = 5000 + Math.random() * 3000;
        });

        function animate(time) {
            requestAnimationFrame(animate);

            if (decelerating) {
                const elapsed = time - decelStartTime;
                const t = Math.min(elapsed / decelDuration, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                rotationSpeed = BASE_SPEED * (1 - ease);
                if (t >= 1) {
                    rotationSpeed = 0;
                    decelerating = false;
                    if (!globeStopped) {
                        globeStopped = true;
                        // Adjust rotation if the visible face is mostly ocean
                        const goodRotation = findLandRichRotation(globe.rotation.y);
                        if (goodRotation !== globe.rotation.y) {
                            // Smoothly nudge to the nearest land-rich face
                            const targetRot = goodRotation;
                            const nudgeStart = performance.now();
                            const nudgeDuration = 800;
                            const startRot = globe.rotation.y;
                            function nudge(now) {
                                const nt = Math.min((now - nudgeStart) / nudgeDuration, 1);
                                const ease = nt < 0.5 ? 2 * nt * nt : 1 - Math.pow(-2 * nt + 2, 2) / 2;
                                globe.rotation.y = startRot + (targetRot - startRot) * ease;
                                if (nt < 1) {
                                    requestAnimationFrame(nudge);
                                } else {
                                    launchDart();
                                }
                            }
                            requestAnimationFrame(nudge);
                        } else {
                            setTimeout(launchDart, 300);
                        }
                    }
                }
            }

            globe.rotation.y += rotationSpeed;
            updateZoom(time);
            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Resize handling
        window.addEventListener('resize', () => {
            const h = window.innerHeight - 100;
            camera.aspect = window.innerWidth / h;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, h);
        });
