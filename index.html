<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartAway - Jeremy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #globe-container {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        #controls {
            padding: 24px 0 40px;
            text-align: center;
        }

        #dart {
            font-size: 64px;
            z-index: 10;
            filter: drop-shadow(0 0 8px rgba(255, 100, 50, 0.6));
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        #dart:hover:not(.thrown) {
            transform: scale(1.15);
        }

        #dart.thrown {
            position: fixed;
            pointer-events: none;
            cursor: default;
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>
    <div id="controls">
        <div id="dart">🏹</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('globe-container');
        const dartEl = document.getElementById('dart');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight - 100), 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 100);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Starfield
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 100;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        scene.add(new THREE.Points(starGeometry, starMaterial));

        // Globe
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const texture = new THREE.TextureLoader().load(
            'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'
        );
        const material = new THREE.MeshPhongMaterial({ map: texture });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Country coordinates [name, lat, lng]
        const countries = [
            ["France", 46.6, 2.2], ["Brazil", -14.2, -51.9], ["Japan", 36.2, 138.3],
            ["Australia", -25.3, 133.8], ["USA", 39.8, -98.6], ["Canada", 56.1, -106.3],
            ["India", 20.6, 78.9], ["China", 35.9, 104.2], ["Russia", 61.5, 105.3],
            ["Mexico", 23.6, -102.6], ["Argentina", -38.4, -63.6], ["Egypt", 26.8, 30.8],
            ["South Africa", -30.6, 22.9], ["Nigeria", 9.1, 8.7], ["Kenya", -0.02, 37.9],
            ["UK", 55.4, -3.4], ["Germany", 51.2, 10.4], ["Italy", 41.9, 12.6],
            ["Spain", 40.5, -3.7], ["Turkey", 39.0, 35.2], ["Iran", 32.4, 53.7],
            ["Saudi Arabia", 23.9, 45.1], ["Indonesia", -0.8, 113.9], ["Thailand", 15.9, 101.0],
            ["Colombia", 4.6, -74.3], ["Peru", -9.2, -75.0], ["Chile", -35.7, -71.5],
            ["Morocco", 31.8, -7.1], ["Algeria", 28.0, 1.7], ["Norway", 60.5, 8.5],
            ["Sweden", 60.1, 18.6], ["Finland", 61.9, 25.7], ["Poland", 51.9, 19.1],
            ["Ukraine", 48.4, 31.2], ["Greece", 39.1, 21.8], ["Portugal", 39.4, -8.2],
            ["Mongolia", 46.9, 103.8], ["Vietnam", 14.1, 108.3], ["Philippines", 12.9, 121.8],
            ["New Zealand", -40.9, 174.9], ["Iceland", 64.9, -19.0], ["Cuba", 21.5, -78.0],
            ["Madagascar", -18.8, 46.9], ["Ethiopia", 9.1, 40.5], ["Tanzania", -6.4, 34.9],
            ["Pakistan", 30.4, 69.3], ["Afghanistan", 33.9, 67.7], ["Iraq", 33.2, 43.7],
            ["Venezuela", 6.4, -66.6], ["Ecuador", -1.8, -78.2], ["Bolivia", -16.3, -63.6],
        ];

        // Dart start position (captured when thrown)

        // Convert lat/lng to 3D point on sphere (radius 1)
        function latLngToVector3(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -Math.sin(phi) * Math.cos(theta),
                Math.cos(phi),
                Math.sin(phi) * Math.sin(theta)
            );
        }

        // Project 3D world position to 2D screen coordinates
        function toScreenPosition(worldPos) {
            const vector = worldPos.clone().project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            return {
                x: (vector.x * 0.5 + 0.5) * rect.width + rect.left,
                y: (-vector.y * 0.5 + 0.5) * rect.height + rect.top,
            };
        }

        // Pick a random country visible on the front face of the globe
        function pickVisibleCountry() {
            const cameraDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            const visible = [];
            for (const [name, lat, lng] of countries) {
                const localPos = latLngToVector3(lat, lng);
                const worldPos = localPos.clone().applyMatrix4(globe.matrixWorld);
                const dirToCamera = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
                const normal = worldPos.clone().sub(globe.position).normalize();
                if (normal.dot(dirToCamera) > 0.15) {
                    visible.push({ name, lat, lng, localPos, worldPos });
                }
            }
            if (visible.length === 0) return null;
            return visible[Math.floor(Math.random() * visible.length)];
        }

        // Animate the dart throw
        function throwDart(target) {
            const rect = dartEl.getBoundingClientRect();
            const startX = rect.left;
            const startY = rect.top;
            // Switch to fixed positioning for flight
            dartEl.classList.add('thrown');
            dartEl.style.left = startX + 'px';
            dartEl.style.top = startY + 'px';
            dartEl.style.transform = 'rotate(-45deg)';

            const screenTarget = toScreenPosition(target.worldPos);
            const endX = screenTarget.x - 24;
            const endY = screenTarget.y - 24;
            const duration = 600;
            const start = performance.now();

            function animateDart(now) {
                const t = Math.min((now - start) / duration, 1);
                const ease = 1 - (1 - t) * (1 - t);
                const x = startX + (endX - startX) * ease;
                const y = startY + (endY - startY) * ease;
                const arc = -150 * Math.sin(Math.PI * t);
                dartEl.style.left = x + 'px';
                dartEl.style.top = (y + arc) + 'px';

                const angle = -45 + (t * 45);
                dartEl.style.transform = `rotate(${angle}deg)`;

                if (t < 1) {
                    requestAnimationFrame(animateDart);
                } else {
                    dartEl.style.transform = 'rotate(0deg) scale(1.2)';
                    placePinOnGlobe(target);
                }
            }
            requestAnimationFrame(animateDart);
        }

        // Place a small red pin on the globe at the target
        function placePinOnGlobe(target) {
            const pinGeometry = new THREE.SphereGeometry(0.025, 16, 16);
            const pinMaterial = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            const pin = new THREE.Mesh(pinGeometry, pinMaterial);
            pin.position.copy(target.localPos.clone().multiplyScalar(1.02));
            globe.add(pin);

            // Show country name
            const label = document.createElement('div');
            label.textContent = target.name;
            label.style.cssText = 'position:fixed;z-index:20;color:#fff;font-size:1.4rem;font-weight:700;' +
                'background:rgba(238,90,36,0.85);padding:8px 20px;border-radius:24px;pointer-events:none;' +
                'opacity:0;transition:opacity 0.5s;text-align:center;';
            document.body.appendChild(label);
            const screenPos = toScreenPosition(target.worldPos);
            label.style.left = (screenPos.x - label.offsetWidth / 2) + 'px';
            label.style.top = (screenPos.y - 60) + 'px';
            // Re-center after measuring
            requestAnimationFrame(() => {
                label.style.left = (screenPos.x - label.offsetWidth / 2) + 'px';
                label.style.opacity = '1';
            });
        }

        // Rotation state
        const BASE_SPEED = 0.045;
        let rotationSpeed = BASE_SPEED;
        let decelerating = false;
        let decelStartTime = 0;
        let decelDuration = 5000;
        let globeStopped = false;

        dartEl.addEventListener('click', () => {
            if (dartEl.classList.contains('thrown')) return;
            dartEl.style.opacity = '0.5';
            dartEl.style.pointerEvents = 'none';
            decelerating = true;
            decelStartTime = performance.now();
            decelDuration = 5000 + Math.random() * 3000;
        });

        function animate(time) {
            requestAnimationFrame(animate);

            if (decelerating) {
                const elapsed = time - decelStartTime;
                const t = Math.min(elapsed / decelDuration, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                rotationSpeed = BASE_SPEED * (1 - ease);
                if (t >= 1) {
                    rotationSpeed = 0;
                    decelerating = false;
                    if (!globeStopped) {
                        globeStopped = true;
                        setTimeout(() => {
                            const target = pickVisibleCountry();
                            if (target) throwDart(target);
                        }, 300);
                    }
                }
            }

            globe.rotation.y += rotationSpeed;
            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Resize handling
        window.addEventListener('resize', () => {
            const h = window.innerHeight - 100;
            camera.aspect = window.innerWidth / h;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, h);
        });
    </script>
</body>
</html>
